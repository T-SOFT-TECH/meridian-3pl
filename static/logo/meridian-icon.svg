<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Cardinal Point template (N, E, S, W) -->
    <path id="cardinal-point" d="M 0,-250 L 35,-145 L 0,-95 L -35,-145 Z" />
    <!-- Ordinal Point template (NE, SE, SW, NW) -->
    <path id="ordinal-point" d="M 0,-212 L 22,-150 L 0,-115 L -22,-150 Z" />
  </defs>

  <!-- Main Compass Rose Body -->
  <g transform="translate(250, 250)" fill="#0022a6">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#0022a6" stroke-width="36" />

    <!-- 4 Cardinal Points -->
    <use href="#cardinal-point" />
    <use href="#cardinal-point" transform="rotate(90)" />
    <use href="#cardinal-point" transform="rotate(180)" />
    <use href="#cardinal-point" transform="rotate(270)" />

    <!-- 4 Ordinal Points -->
    <use href="#ordinal-point" transform="rotate(45)" />
    <use href="#ordinal-point" transform="rotate(135)" />
    <use href="#ordinal-point" transform="rotate(225)" />
    <use href="#ordinal-point" transform="rotate(315)" />
  </g>

  <!-- Central Compass Needle (Rotated 45 degrees) -->
  <g transform="translate(250, 250) rotate(45)">
    <!-- Left/Top-Left Dark Side -->
    <path d="M 0,-175 L -38,0 L 0,175 Z" fill="#00136b" />
    <!-- Right/Bottom-Right Light Side -->
    <path d="M 0,-175 L 38,0 L 0,175 Z" fill="#0036cc" />
  </g>

  <!-- Center Pivot Hole -->
  <circle cx="250" cy="250" r="16" fill="#ffffff" />
</svg>
